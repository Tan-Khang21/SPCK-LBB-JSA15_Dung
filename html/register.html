<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href=".reset.css">
    <link rel="stylesheet" href=".loginstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="register">
        <div class="register-logo">
            <div class="register-img">
                <img src="./img/logo.png" alt="">
            </div>
        </div>
        <div class="register-title">
            <h2 class="title-register">Login to account</h2>
            <p class="title-content">Access to the most powerfull tool in the entire design and web industry.</p>
        </div>
        <div class="register-main">
            <form action="#">
                <input type="name" class="fullname" id="fullname" placeholder="Full name">
                <input type="email" class="email" id="email" placeholder="Email Address">
                <input type="password" class="password" id="password" placeholder="password">
                <button class="button-register" type="submit">Register</button>
                <!-- <a href="" class="button-register">forget password?</a> -->
                <div class="main-register">
                    <a href="">Login to account</a>
                </div>
            </form>
        </div>
        <div class="login-option">
            <p class="option-title">Or login with</p>
            <ul class="network-option">
            <li><i class="fa-brands fa-facebook"></i> Facebook</li>
            <li><i class="fa-brands fa-google"></i>Google</li>
            <li><i class="fa-brands fa-linkedin-in"></i>Linkedin</li>
            </ul>
        </div>
    </div>
    <script src="./javascript/register.js"></script>
</body>
</html>
